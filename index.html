<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pepenator - Meme Coin Apocalypse</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      border: 4px solid #00ff41;
      box-shadow: 0 0 40px rgba(0, 255, 65, 0.6);
    }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #00ff41;
      pointer-events: none;
      text-shadow: 0 0 10px #00ff41;
    }
    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff0000;
      font-size: 52px;
      text-align: center;
      display: none;
      text-shadow: 0 0 20px red;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="900" height="600"></canvas>
  
  <div id="ui">
    <div>SCORE: <span id="score">0</span></div>
    <div>KILLS: <span id="kills">0</span></div>
    <div>HIGH: <span id="highscore">0</span></div>
  </div>

  <div id="gameOver">
    GAME OVER<br>
    <span style="font-size: 28px; color: white;">Final Score: <span id="finalScore">0</span></span><br><br>
    Press <strong>R</strong> to Restart
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const killsEl = document.getElementById('kills');
    const highscoreEl = document.getElementById('highscore');
    const gameOverEl = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');

    let player = { x: 450, y: 300, size: 32, speed: 5.5 };
    let bullets = [];
    let enemies = [];
    let explosions = [];
    let score = 0;
    let kills = 0;
    let highscore = 0;
    let gameOver = false;
    let keys = {};
    let mouse = { x: 450, y: 300 };
    let mouseDown = false;
    let lastShot = 0;
    const FIRE_RATE = 140;
    let bossSpawned = false;

    // Your custom Pepe image
    const pepeImg = new Image();
    pepeImg.src = "https://ibb.co/ymwsTq2D";

    const memeTypes = [
      {name: "Doge", color: "#e0a030", emoji: "🐕"},
      {name: "Shib", color: "#c06020", emoji: "🦊"},
      {name: "Troll", color: "#80c040", emoji: "😈"},
      {name: "Grumpy", color: "#606060", emoji: "😾"},
      {name: "Sonic", color: "#00a0ff", emoji: "🌀"},
      {name: "Wojak", color: "#a08060", emoji: "😭"},
      {name: "Chad", color: "#ff4040", emoji: "💪"},
      {name: "Apu", color: "#ffd700", emoji: "🛒"},
      {name: "Gigachad", color: "#c0c0c0", emoji: "🗿"},
      {name: "RarePepe", color: "#00aa00", emoji: "🐸"}
    ];

    function spawnEnemy() {
      const side = Math.random();
      let x, y;
      if (side < 0.25) { x = -30; y = Math.random() * canvas.height; }
      else if (side < 0.5) { x = canvas.width + 30; y = Math.random() * canvas.height; }
      else if (side < 0.75) { x = Math.random() * canvas.width; y = -30; }
      else { x = Math.random() * canvas.width; y = canvas.height + 30; }

      const type = memeTypes[Math.floor(Math.random() * memeTypes.length)];
      
      enemies.push({
        x: x,
        y: y,
        size: 26,
        speed: 1.7 + Math.random() * 0.7,
        type: type,
        health: 2,
        isBoss: false
      });
    }

    function spawnBoss() {
      bossSpawned = true;
      enemies.push({
        x: canvas.width / 2,
        y: -60,
        size: 55,
        speed: 1.4,
        type: {name: "TROLL BOSS", color: "#ff00ff", emoji: "🤡"},
        health: 25,
        isBoss: true
      });
    }

    function createExplosion(x, y) {
      explosions.push({
        x: x,
        y: y,
        radius: 10,
        maxRadius: 90,
        alpha: 1.0,
        time: 0
      });
    }

    function shoot() {
      if (gameOver) return;
      const dx = mouse.x - player.x;
      const dy = mouse.y - player.y;
      const dist = Math.hypot(dx, dy) || 1;
      bullets.push({
        x: player.x,
        y: player.y,
        vx: (dx / dist) * 13,
        vy: (dy / dist) * 13,
        life: 55
      });
    }

    canvas.addEventListener('mousedown', (e) => { if (e.button === 0) mouseDown = true; });
    canvas.addEventListener('mouseup', () => mouseDown = false);
    canvas.addEventListener('mouseleave', () => mouseDown = false);

    window.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      if (gameOver && e.key.toLowerCase() === 'r') resetGame();
    });
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;
    });

    function resetGame() {
      player.x = 450; player.y = 300;
      bullets = [];
      enemies = [];
      explosions = [];
      score = 0;
      kills = 0;
      bossSpawned = false;
      gameOver = false;
      mouseDown = false;
      gameOverEl.style.display = 'none';
      updateUI();
    }

    function updateUI() {
      scoreEl.textContent = score;
      killsEl.textContent = kills;
      highscoreEl.textContent = highscore;
    }

    function drawPlayer() {
      const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(angle);
      
      // Draw your custom Pepe image
      ctx.drawImage(pepeImg, -player.size/2, -player.size/2, player.size, player.size);
      
      ctx.restore();
    }

    function drawEnemy(e) {
      ctx.save();
      ctx.translate(e.x, e.y);
      if (e.isBoss) ctx.scale(2.2, 2.2);
      
      ctx.font = e.isBoss ? '42px Arial' : '32px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = e.type.color;
      ctx.fillText(e.type.emoji, 0, 0);
      ctx.restore();
    }

    function gameLoop() {
      if (gameOver) {
        requestAnimationFrame(gameLoop);
        return;
      }

      // Movement
      if (keys['w'] || keys['arrowup']) player.y -= player.speed;
      if (keys['s'] || keys['arrowdown']) player.y += player.speed;
      if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
      if (keys['d'] || keys['arrowright']) player.x += player.speed;

      player.x = Math.max(30, Math.min(canvas.width - 30, player.x));
      player.y = Math.max(30, Math.min(canvas.height - 30, player.y));

      // Rapid Fire
      if (mouseDown && Date.now() - lastShot > FIRE_RATE) {
        shoot();
        lastShot = Date.now();
      }

      if (Math.random() < 0.04) spawnEnemy();

      if (kills >= 100 && !bossSpawned) spawnBoss();

      // Bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        b.life--;
        if (b.life <= 0) bullets.splice(i, 1);
      }

      // Enemies
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.hypot(dx, dy) || 1;
        e.x += (dx / dist) * e.speed;
        e.y += (dy / dist) * e.speed;

        if (Math.hypot(e.x - player.x, e.y - player.y) < 38) {
          gameOver = true;
          if (score > highscore) highscore = score;
          finalScoreEl.textContent = score;
          gameOverEl.style.display = 'block';
        }

        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (Math.hypot(b.x - e.x, b.y - e.y) < (e.isBoss ? 48 : 22)) {
            e.health--;
            bullets.splice(j, 1);
            if (e.health <= 0) {
              const wasMilestone = (kills % 10 === 9);
              enemies.splice(i, 1);
              score += e.isBoss ? 500 : 10;
              kills++;
              updateUI();

              if (wasMilestone) createExplosion(e.x, e.y);
            }
            break;
          }
        }
      }

      // Explosions
      for (let i = explosions.length - 1; i >= 0; i--) {
        const exp = explosions[i];
        exp.radius += 6;
        exp.alpha -= 0.035;

        if (exp.alpha <= 0) {
          explosions.splice(i, 1);
          continue;
        }

        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (!e.isBoss && Math.hypot(e.x - exp.x, e.y - exp.y) < exp.radius + 20) {
            e.health -= 3;
            if (e.health <= 0) {
              enemies.splice(j, 1);
              score += 15;
              kills++;
              updateUI();
            }
          }
        }
      }

      // Draw everything
      ctx.fillStyle = '#120822';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Background debris
      ctx.fillStyle = '#3a2a55';
      for (let i = 0; i < 35; i++) {
        ctx.fillRect((Date.now() / 10 + i * 50) % canvas.width, i * 17 % canvas.height, 5, 5);
      }

      // Player (Your Image)
      drawPlayer();

      // Bullets
      ctx.fillStyle = '#ff00ff';
      for (let b of bullets) {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 7, 0, Math.PI * 2);
        ctx.fill();
      }

      // Enemies
      for (let e of enemies) drawEnemy(e);

      // Explosions
      for (let exp of explosions) {
        ctx.save();
        ctx.globalAlpha = exp.alpha;
        ctx.beginPath();
        ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 140, 0, ${exp.alpha * 0.7})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(exp.x, exp.y, exp.radius * 0.55, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 230, 80, ${exp.alpha})`;
        ctx.fill();
        ctx.restore();
      }

      requestAnimationFrame(gameLoop);
    }

    // Wait for image to load before starting
    pepeImg.onload = () => {
      resetGame();
      gameLoop();
    };

    // Fallback in case image fails to load
    pepeImg.onerror = () => {
      console.log("Image failed to load, using backup");
      resetGame();
      gameLoop();
    };
  </script>
</body>
</html>
