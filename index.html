<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pepenator - Meme Coin Apocalypse</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    canvas {
      image-rendering: pixelated;
      border: 4px solid #00ff41;
      box-shadow: 0 0 40px rgba(0, 255, 65, 0.6);
    }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #00ff41;
      pointer-events: none;
      text-shadow: 0 0 10px #00ff41;
    }
    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ff0000;
      font-size: 52px;
      text-align: center;
      display: none;
      text-shadow: 0 0 20px red;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="900" height="600"></canvas>
  
  <div id="ui">
    <div>SCORE: <span id="score">0</span></div>
    <div>KILLS: <span id="kills">0</span></div>
    <div>HIGH: <span id="highscore">0</span></div>
  </div>

  <div id="gameOver">
    GAME OVER<br>
    <span style="font-size: 28px; color: white;">Final Score: <span id="finalScore">0</span></span><br><br>
    Press <strong>R</strong> to Restart
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const killsEl = document.getElementById('kills');
    const highscoreEl = document.getElementById('highscore');
    const gameOverEl = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');

    let player = { x: 450, y: 300, size: 32, speed: 5.5 };
    let bullets = [];
    let enemies = [];
    let explosions = [];
    let score = 0;
    let kills = 0;
    let highscore = 0;
    let gameOver = false;
    let keys = {};
    let mouse = { x: 450, y: 300 };
    let mouseDown = false;
    let lastShot = 0;
    const FIRE_RATE = 140;
    let bossSpawned = false;

    // Audio Context
    let audioCtx;
    let musicInterval;

    function initAudio() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // Hardcore 8-bit Shoot Sound
      window.shootSound = () => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
        gain.gain.value = 0.4;
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
        osc.stop(audioCtx.currentTime + 0.12);
      };

      // Explosion
      window.explodeSound = () => {
        const noise = audioCtx.createBufferSource();
        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.8, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < buffer.length; i++) data[i] = Math.random() * 2 - 1;
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 800;
        const gain = audioCtx.createGain();
        gain.gain.value = 0.7;
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.9);
        noise.connect(filter).connect(gain).connect(audioCtx.destination);
        noise.start();
      };

      // Hit
      window.hitSound = () => {
        const osc = audioCtx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(250, audioCtx.currentTime);
        const gain = audioCtx.createGain();
        gain.gain.value = 0.25;
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
        osc.stop(audioCtx.currentTime + 0.08);
      };
    }

    // **HARDCORE 8-BIT MUSIC**
    function startHardcoreMusic() {
      if (musicInterval) clearInterval(musicInterval);
      
      const bassNotes = [130.81, 164.81, 196, 130.81]; // Low & heavy
      const leadNotes = [523.25, 659.25, 783.99, 1046.5, 783.99, 659.25, 523.25];
      let bassIndex = 0;
      let leadIndex = 0;

      musicInterval = setInterval(() => {
        if (gameOver) return;

        // Heavy Bass
        const bass = audioCtx.createOscillator();
        bass.type = 'triangle';
        bass.frequency.value = bassNotes[bassIndex % bassNotes.length];
        const bassGain = audioCtx.createGain();
        bassGain.gain.value = 0.18;
        bass.connect(bassGain).connect(audioCtx.destination);
        bass.start();
        bassGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
        bass.stop(audioCtx.currentTime + 0.4);
        bassIndex++;

        // Fast Lead (more aggressive)
        if (Math.random() > 0.3) {
          const lead = audioCtx.createOscillator();
          lead.type = 'sawtooth';
          lead.frequency.value = leadNotes[leadIndex % leadNotes.length];
          const leadGain = audioCtx.createGain();
          leadGain.gain.value = 0.12;
          lead.connect(leadGain).connect(audioCtx.destination);
          lead.start();
          leadGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
          lead.stop(audioCtx.currentTime + 0.15);
          leadIndex++;
        }
      }, 110); // Very fast tempo = HARDCORE
    }

    function drawDefaultPepe(x, y, angle) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(angle);
      ctx.fillStyle = '#00aa00';
      ctx.fillRect(-20, -20, 40, 40);
      ctx.fillStyle = '#00ff44';
      ctx.fillRect(-15, -15, 30, 30);
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(8, -9, 14, 8);
      ctx.fillStyle = '#ffff00';
      ctx.fillRect(18, -7, 6, 4);
      ctx.fillStyle = '#333';
      ctx.fillRect(18, -4, 26, 9);
      ctx.restore();
    }

    function spawnEnemy() {
      const side = Math.random();
      let x = side < 0.25 ? -30 : side < 0.5 ? canvas.width + 30 : Math.random() * canvas.width;
      let y = side < 0.75 ? (side < 0.5 ? -30 : canvas.height + 30) : Math.random() * canvas.height;

      const memeTypes = [
        {name: "Doge", color: "#e0a030", emoji: "🐕"},
        {name: "Shib", color: "#c06020", emoji: "🦊"},
        {name: "Troll", color: "#80c040", emoji: "😈"},
        {name: "Grumpy", color: "#606060", emoji: "😾"},
        {name: "Sonic", color: "#00a0ff", emoji: "🌀"},
        {name: "Wojak", color: "#a08060", emoji: "😭"},
        {name: "Chad", color: "#ff4040", emoji: "💪"},
        {name: "Apu", color: "#ffd700", emoji: "🛒"},
        {name: "Gigachad", color: "#c0c0c0", emoji: "🗿"},
        {name: "RarePepe", color: "#00aa00", emoji: "🐸"}
      ];

      const type = memeTypes[Math.floor(Math.random() * memeTypes.length)];
      enemies.push({ x, y, size: 26, speed: 1.7 + Math.random() * 0.7, type, health: 2, isBoss: false });
    }

    function spawnBoss() {
      bossSpawned = true;
      enemies.push({ x: canvas.width / 2, y: -60, size: 55, speed: 1.4,
        type: {name: "TROLL BOSS", color: "#ff00ff", emoji: "🤡"}, health: 25, isBoss: true });
    }

    function createExplosion(x, y) {
      explosions.push({ x, y, radius: 15, alpha: 1.0 });
      window.explodeSound();
    }

    function shoot() {
      if (gameOver) return;
      const dx = mouse.x - player.x;
      const dy = mouse.y - player.y;
      const dist = Math.hypot(dx, dy) || 1;
      bullets.push({ x: player.x, y: player.y, vx: (dx / dist) * 13, vy: (dy / dist) * 13, life: 55 });
      window.shootSound();
    }

    canvas.addEventListener('mousedown', e => { if (e.button === 0) mouseDown = true; });
    canvas.addEventListener('mouseup', () => mouseDown = false);
    canvas.addEventListener('mouseleave', () => mouseDown = false);

    window.addEventListener('keydown', e => {
      keys[e.key.toLowerCase()] = true;
      if (gameOver && e.key.toLowerCase() === 'r') resetGame();
    });
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;
    });

    function resetGame() {
      player.x = 450; player.y = 300;
      bullets = []; enemies = []; explosions = [];
      score = 0; kills = 0; bossSpawned = false; gameOver = false;
      gameOverEl.style.display = 'none';
      updateUI();
    }

    function updateUI() {
      scoreEl.textContent = score;
      killsEl.textContent = kills;
      highscoreEl.textContent = highscore;
    }

    function gameLoop() {
      if (gameOver) { requestAnimationFrame(gameLoop); return; }

      if (keys['w'] || keys['arrowup']) player.y -= player.speed;
      if (keys['s'] || keys['arrowdown']) player.y += player.speed;
      if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
      if (keys['d'] || keys['arrowright']) player.x += player.speed;

      player.x = Math.max(30, Math.min(canvas.width - 30, player.x));
      player.y = Math.max(30, Math.min(canvas.height - 30, player.y));

      if (mouseDown && Date.now() - lastShot > FIRE_RATE) {
        shoot();
        lastShot = Date.now();
      }

      if (Math.random() < 0.04) spawnEnemy();
      if (kills >= 100 && !bossSpawned) spawnBoss();

      // Update bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx; b.y += b.vy; b.life--;
        if (b.life <= 0) bullets.splice(i, 1);
      }

      // Update enemies
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const dist = Math.hypot(dx, dy) || 1;
        e.x += (dx / dist) * e.speed;
        e.y += (dy / dist) * e.speed;

        if (Math.hypot(e.x - player.x, e.y - player.y) < 38) {
          gameOver = true;
          if (score > highscore) highscore = score;
          finalScoreEl.textContent = score;
          gameOverEl.style.display = 'block';
          return;
        }

        for (let j = bullets.length - 1; j >= 0; j--) {
          const b = bullets[j];
          if (Math.hypot(b.x - e.x, b.y - e.y) < (e.isBoss ? 48 : 22)) {
            e.health--;
            bullets.splice(j, 1);
            window.hitSound();
            if (e.health <= 0) {
              const wasMilestone = (kills % 10 === 9);
              enemies.splice(i, 1);
              score += e.isBoss ? 500 : 10;
              kills++;
              updateUI();
              if (wasMilestone) createExplosion(e.x, e.y);
            }
            break;
          }
        }
      }

      // Explosions
      for (let i = explosions.length - 1; i >= 0; i--) {
        const exp = explosions[i];
        exp.radius += 7;
        exp.alpha -= 0.04;
        if (exp.alpha <= 0) { explosions.splice(i, 1); continue; }

        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (!e.isBoss && Math.hypot(e.x - exp.x, e.y - exp.y) < exp.radius + 20) {
            e.health -= 3;
            if (e.health <= 0) {
              enemies.splice(j, 1);
              score += 15; kills++; updateUI();
            }
          }
        }
      }

      // Draw
      ctx.fillStyle = '#120822';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#3a2a55';
      for (let i = 0; i < 35; i++) {
        ctx.fillRect((Date.now()/10 + i*50) % canvas.width, i*17 % canvas.height, 5, 5);
      }

      const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(angle);
      drawDefaultPepe(0, 0, 0);
      ctx.restore();

      ctx.fillStyle = '#ff00ff';
      for (let b of bullets) {
        ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, Math.PI*2); ctx.fill();
      }

      for (let e of enemies) {
        ctx.save();
        ctx.translate(e.x, e.y);
        if (e.isBoss) ctx.scale(2.2, 2.2);
        ctx.font = e.isBoss ? '42px Arial' : '32px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = e.type.color;
        ctx.fillText(e.type.emoji, 0, 0);
        ctx.restore();
      }

      for (let exp of explosions) {
        ctx.save();
        ctx.globalAlpha = exp.alpha;
        ctx.beginPath();
        ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255, 100, 0, ${exp.alpha * 0.8})`;
        ctx.fill();
        ctx.restore();
      }

      requestAnimationFrame(gameLoop);
    }

    // Start Game
    initAudio();
    startHardcoreMusic();
    resetGame();
    gameLoop();
  </script>
</body>
</html>
